<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>醫檢師國考複習系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2336;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.12);
    --correct: #2dca8c;
    --correct-dim: rgba(45,202,140,0.12);
    --wrong: #f75f5f;
    --wrong-dim: rgba(247,95,95,0.12);
    --text: #e8eaf2;
    --text-muted: #7880a0;
    --text-dim: #a0a8c0;
    --gold: #f5c842;
    --radius: 12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── HEADER ─── */
  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #7b6cf5);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .header-stats {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-chip span {
    color: var(--accent);
    font-weight: 600;
  }

  /* ─── PROGRESS BAR ─── */
  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #7b6cf5);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ─── MAIN ─── */
  main {
    width: 100%;
    max-width: 780px;
    padding: 2.5rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ─── SUBJECT BADGE ─── */
  .subject-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 14px;
    border-radius: 999px;
    background: var(--accent-dim);
    border: 1px solid rgba(79,142,247,0.25);
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
    align-self: flex-start;
  }

  /* ─── QUESTION CARD ─── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .q-number em {
    color: var(--gold);
    font-style: normal;
    font-weight: 600;
  }

  .q-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.08rem;
    font-weight: 600;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 1.8rem;
  }

  /* ─── OPTIONS ─── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 1rem 1.2rem;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.6;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.18s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    transform: translateX(4px);
  }

  .option-btn:hover:not(:disabled)::before {
    opacity: 0.04;
  }

  .option-label {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    transition: all 0.18s;
    position: relative;
    z-index: 1;
  }

  .option-text {
    position: relative;
    z-index: 1;
    padding-top: 4px;
  }

  /* ─── CORRECT STATE ─── */
  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-dim);
    cursor: default;
  }

  .option-btn.correct .option-label {
    background: var(--correct);
    color: #0f1117;
  }

  /* ─── WRONG STATE ─── */
  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-dim);
    cursor: default;
    animation: shake 0.35s ease;
  }

  .option-btn.wrong .option-label {
    background: var(--wrong);
    color: #fff;
  }

  /* ─── NEUTRAL (after answer, unselected correct) ─── */
  .option-btn.highlight-correct {
    border-color: var(--correct);
    background: var(--correct-dim);
    cursor: default;
  }

  .option-btn.highlight-correct .option-label {
    background: var(--correct);
    color: #0f1117;
  }

  .option-btn.dimmed {
    opacity: 0.4;
    cursor: default;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(6px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }

  /* ─── FEEDBACK BANNER ─── */
  .feedback {
    display: none;
    margin-top: 1.5rem;
    border-radius: var(--radius-sm);
    overflow: hidden;
    animation: fadeUp 0.25s ease both;
  }

  .feedback.visible { display: block; }

  .feedback-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.75rem 1.2rem;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .feedback.correct-fb .feedback-header {
    background: rgba(45,202,140,0.18);
    color: var(--correct);
    border-bottom: 1px solid rgba(45,202,140,0.2);
  }

  .feedback.wrong-fb .feedback-header {
    background: rgba(247,95,95,0.15);
    color: var(--wrong);
    border-bottom: 1px solid rgba(247,95,95,0.2);
  }

  .feedback-body {
    padding: 1rem 1.2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top: none;
    font-size: 0.9rem;
    line-height: 1.75;
    color: var(--text-dim);
  }

  .feedback-body strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ─── NAV ─── */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-top: 0.5rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0.65rem 1.4rem;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    border: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: #6fa3ff;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(79,142,247,0.35);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  /* ─── RESULT CARD ─── */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    animation: fadeUp 0.4s ease both;
  }

  .result-card.visible { display: block; }

  .result-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 4rem;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .result-label {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  .breakdown-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .breakdown-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
  }

  .breakdown-num.c { color: var(--correct); }
  .breakdown-num.w { color: var(--wrong); }

  .breakdown-label {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  /* ─── DOTS ─── */
  .dots-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    background: var(--border);
    cursor: pointer;
    transition: all 0.18s;
  }

  .dot.current { background: var(--accent); transform: scale(1.3); }
  .dot.answered-correct { background: var(--correct); }
  .dot.answered-wrong { background: var(--wrong); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔬</div>
    <div>
      <div class="logo-text">醫檢師國考複習系統</div>
      <div class="logo-sub">醫事檢驗師國考　100–114 年題庫</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-chip">題目 <span id="hdr-current">1</span> / <span id="hdr-total">2</span></div>
    <div class="stat-chip">正確 <span id="hdr-correct">0</span></div>
    <div class="stat-chip">錯誤 <span id="hdr-wrong">0</span></div>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
</div>

<main>
  <!-- Dots navigation -->
  <div class="dots-nav" id="dots-nav"></div>

  <!-- Question section -->
  <div id="quiz-section">
    <div class="subject-badge" id="subject-badge">📋 科目</div>

    <div class="question-card" id="question-card">
      <div class="question-meta">
        <div class="q-number">第 <em id="q-num">1</em> 題 <span style="color:var(--text-muted)">（共 <span id="q-total">2</span> 題）</span></div>
        <div id="q-year" style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:2px 10px;border-radius:999px;display:none;"></div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>

      <div class="feedback" id="feedback">
        <div class="feedback-header" id="feedback-header"></div>
        <div class="feedback-body" id="feedback-body"></div>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn btn-ghost" id="btn-prev" onclick="navigate(-1)">← 上一題</button>
      <button class="btn btn-primary" id="btn-next" onclick="navigate(1)">下一題 →</button>
    </div>
  </div>

  <!-- Result section -->
  <div class="result-card" id="result-card">
    <div class="result-score" id="result-score">0%</div>
    <div class="result-label">本次測驗成績</div>
    <div class="result-breakdown">
      <div class="breakdown-item">
        <div class="breakdown-num c" id="res-correct">0</div>
        <div class="breakdown-label">答對</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-num w" id="res-wrong">0</div>
        <div class="breakdown-label">答錯</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-num" style="color:var(--text-muted)" id="res-skip">0</div>
        <div class="breakdown-label">未作答</div>
      </div>
    </div>
    <div id="result-subject-breakdown" style="margin-bottom:1.5rem;text-align:left;"></div>
    <button class="btn btn-primary" onclick="restartQuiz()">🔄 重新開始</button>
  </div>
</main>

<script>
// ════════════════════════════════════════════════════════════════
//  醫事檢驗師國考題庫｜100 年 ~ 114 年
//
//  科目對應（依考選部公告）：
//   ① 臨床生理學與病理學
//   ② 臨床血液學與血庫學
//   ③ 醫學分子檢驗學與臨床鏡檢學（含寄生蟲學）
//   ④ 微生物學及臨床微生物學（含細菌與黴菌）
//   ⑤ 生物化學與臨床生化學
//   ⑥ 臨床血清免疫學與臨床病毒學
//
//  每科目 questions 陣列：依序貼入國考題即可
//  正式考試設定：DRAW_PER_SUBJECT = 80（共 480 題）
//  題庫不足 80 題時，自動全取該科所有題目
//  ★ 111-1、111-2、112-1、112-2、113-1、113-2、114-1 七份試卷已匯入（共 560 題）
// ════════════════════════════════════════════════════════════════

// ── 每科抽出題數（正式考試設 80；測試時可先設小數字）──
const DRAW_PER_SUBJECT = 80;

// ════════════════════════════════════════
//  六大科目題庫
//  格式：
//  {
//    text: "題目內容",
//    options: ["(A)...", "(B)...", "(C)...", "(D)..."],
//    answer: 0,          // 正確選項的 0-based index（A=0, B=1, C=2, D=3）
//    explanation: "解析內容（可使用 HTML 標籤）",
//    year: 100,          // 出題年度（民國年）
//    serial: 1           // 該年度題號
//  }
// ════════════════════════════════════════
const QUESTION_BANK = {

  // ══════════════════════════════════════
  // ① 臨床生理學與病理學
  // ══════════════════════════════════════
  "臨床生理學與病理學": {
    icon: "🫀",
    questions: [
      // ── 待填入國考題（請依格式貼入） ──
      {
        text: "（示例）組織學切片中發現細胞核固縮（pyknosis）、核碎裂（karyorrhexis）及核溶解（karyolysis），此為何種細胞死亡方式的典型形態？",
        options: [
          "細胞凋亡（Apoptosis）",
          "壞死（Necrosis）",
          "細胞自噬（Autophagy）",
          "有絲分裂失敗（Mitotic catastrophe）"
        ],
        answer: 1,
        explanation: `<strong>壞死（Necrosis）</strong>的細胞核形態三聯症：<br><br>
• <strong>Pyknosis（核固縮）</strong>：細胞核縮小、染色質濃縮，H&E 染色呈深藍色。<br>
• <strong>Karyorrhexis（核碎裂）</strong>：固縮的核碎裂成不規則小片段。<br>
• <strong>Karyolysis（核溶解）</strong>：細胞核完全溶解消失（DNase 降解染色質）。<br><br>
• Apoptosis 的核特徵為染色質邊緣化（marginalization），形成 apoptotic body，不引發發炎反應。`,
        year: 0, serial: 0
      }
    ]
  },

  // ══════════════════════════════════════
  // ② 臨床血液學與血庫學
  // ══════════════════════════════════════
  "臨床血液學與血庫學": {
    icon: "🩸",
    questions: [
      {
        text: "（示例）Peripheral blood smear 染色後，發現紅血球內有嗜鹼性點狀物（basophilic stippling），且患者血液中 δ-ALA 及 erythrocyte protoporphyrin 升高，最可能的診斷為何？",
        options: [
          "Iron deficiency anemia",
          "Lead poisoning（鉛中毒）",
          "Hemolytic anemia",
          "Megaloblastic anemia"
        ],
        answer: 1,
        explanation: `<strong>鉛中毒（Lead Poisoning）</strong>的典型血液學表現：<br><br>
• 鉛抑制血基質合成的多個步驟（δ-ALA dehydratase、ferrochelatase），造成 <strong>δ-ALA 與 erythrocyte protoporphyrin 堆積</strong>。<br>
• Basophilic stippling 是因鉛抑制 ribosomal RNA 降解酶，導致核糖體殘留於成熟紅血球中。<br>
• 缺鐵性貧血可見輕度 stippling，但 δ-ALA 不會明顯升高。<br>
• 溶血性貧血以球狀、破碎紅血球為主；巨球性貧血則見 hypersegmented neutrophil。`,
        year: 0, serial: 0
      },
      {
        text: "（示例）ABO 血型系統中，血型為 O 型的人，其血清中含有下列何種抗體？",
        options: [
          "Anti-A 與 Anti-B",
          "僅含 Anti-A",
          "僅含 Anti-B",
          "不含任何 ABO 抗體"
        ],
        answer: 0,
        explanation: `<strong>O 型血</strong>的血庫學特性：<br><br>
• O 型人的紅血球上<strong>不表現 A 或 B 抗原</strong>，血清中自然存在 <strong>Anti-A 與 Anti-B</strong> 兩種天然抗體（主要為 IgM）。<br>
• A 型：含 Anti-B；B 型：含 Anti-A；AB 型：不含 ABO 抗體。<br>
• 輸血時須注意：輸注全血應同型；O 型洗滌紅血球可作為緊急異型輸血的選擇。`,
        year: 0, serial: 0
      }
    ]
  },

  // ══════════════════════════════════════
  // ③ 醫學分子檢驗學與臨床鏡檢學（含寄生蟲學）
  // ══════════════════════════════════════
  "醫學分子檢驗學與臨床鏡檢學": {
    icon: "🔬",
    questions: [
      {
        text: "（示例）糞便檢查發現卵形、兩端有透明塞（polar plug）的蟲卵，最可能是哪種寄生蟲？",
        options: [
          "Ascaris lumbricoides（蛔蟲）",
          "Trichuris trichiura（鞭蟲）",
          "Enterobius vermicularis（蟯蟲）",
          "Hookworm（鉤蟲）"
        ],
        answer: 1,
        explanation: `<strong>Trichuris trichiura（鞭蟲）</strong>蟲卵的經典特徵：<br><br>
• 形狀：橄欖球形（barrel-shaped / football-shaped），兩端各有一透明的 <strong>polar plug（極塞）</strong>。<br>
• 大小：約 50–55 × 22–24 μm，卵殼光滑，黃棕色。<br>

        exam: "第一次", year: 114, exam: "第一次", serial: 80
      }
    ]
  }

}; // end QUESTION_BANK


// ════════════════════════════════════════
//  工具函式：Fisher-Yates Shuffle
// ════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ════════════════════════════════════════
//  從各科隨機抽題，組合成本次測驗題目
// ════════════════════════════════════════
function buildSession() {
  const session = [];
  for (const [subjectName, subjectData] of Object.entries(QUESTION_BANK)) {
    // 將題目加上科目資訊
    const tagged = subjectData.questions.map(q => ({
      ...q,
      subject: subjectName,
      subjectIcon: subjectData.icon
    }));
    // Shuffle 後取前 DRAW_PER_SUBJECT 題（不足則全取）
    const picked = shuffle(tagged).slice(0, DRAW_PER_SUBJECT);
    session.push(...picked);
  }
  // 最後再整體 shuffle，讓六科題目交錯出現
  return shuffle(session);
}

// ════════════════════════════════════════
//  State
// ════════════════════════════════════════
let QUESTIONS   = [];
let current     = 0;
let userAnswers = [];

// ════════════════════════════════════════
//  Init — 每次呼叫都重新抽題
// ════════════════════════════════════════
function init() {
  QUESTIONS   = buildSession();
  userAnswers = new Array(QUESTIONS.length).fill(null);
  current     = 0;

  document.getElementById('hdr-total').textContent = QUESTIONS.length;
  document.getElementById('q-total').textContent   = QUESTIONS.length;
  buildDots();
  renderQuestion(0);
}

function buildDots() {
  const nav = document.getElementById('dots-nav');
  nav.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.title = `第 ${i+1} 題`;
    d.onclick = () => goTo(i);
    nav.appendChild(d);
  });
  refreshDots();
}

function refreshDots() {
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d, i) => {
    d.className = 'dot';
    if (i === current) d.classList.add('current');
    else if (userAnswers[i] !== null) {
      d.classList.add(
        userAnswers[i] === QUESTIONS[i].answer ? 'answered-correct' : 'answered-wrong'
      );
    }
  });
}

// ════════════════════════════════════════
//  Render
// ════════════════════════════════════════
function renderQuestion(idx) {
  current = idx;
  const q = QUESTIONS[idx];
  const answered = userAnswers[idx] !== null;
  const LABELS = ['A', 'B', 'C', 'D', 'E', 'F'];

  document.getElementById('hdr-current').textContent = idx + 1;
  document.getElementById('q-num').textContent        = idx + 1;

  const badge = document.getElementById('subject-badge');
  badge.textContent = `${q.subjectIcon} ${q.subject}`;

  // 年度 / 題號標籤
  const yearEl = document.getElementById('q-year');
  if (q.year && q.year > 0) {
    yearEl.textContent = `民國 ${q.year} 年  第 ${q.serial} 題`;
    yearEl.style.display = '';
  } else {
    yearEl.style.display = 'none';
  }

  document.getElementById('q-text').textContent = q.text;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${LABELS[i]}</span><span class="option-text">${opt}</span>`;

    if (answered) {
      btn.disabled = true;
      const sel = userAnswers[idx];
      if (i === q.answer) btn.classList.add('highlight-correct');
      else if (i === sel) btn.classList.add('wrong');
      else btn.classList.add('dimmed');
    } else {
      btn.onclick = () => selectAnswer(i);
    }
    optDiv.appendChild(btn);
  });

  const fb     = document.getElementById('feedback');
  const fbHead = document.getElementById('feedback-header');
  const fbBody = document.getElementById('feedback-body');

  if (answered) {
    const isCorrect = userAnswers[idx] === q.answer;
    fb.className = `feedback visible ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
    fbHead.innerHTML = isCorrect
      ? '✅ 答對了！'
      : `❌ 答錯了！正確答案是 ${LABELS[q.answer]}`;
    fbBody.innerHTML = `<strong>解析：</strong><br>${q.explanation}`;
  } else {
    fb.className = 'feedback';
  }

  document.getElementById('btn-prev').disabled = (idx === 0);
  const isLast = idx === QUESTIONS.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '查看結果 →' : '下一題 →';

  const answered_count = userAnswers.filter(a => a !== null).length;
  document.getElementById('progress-bar').style.width =
    (answered_count / QUESTIONS.length * 100) + '%';

  let correct = 0, wrong = 0;
  userAnswers.forEach((a, i) => {
    if (a === null) return;
    if (a === QUESTIONS[i].answer) correct++; else wrong++;
  });
  document.getElementById('hdr-correct').textContent = correct;
  document.getElementById('hdr-wrong').textContent   = wrong;

  refreshDots();
  document.getElementById('question-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ════════════════════════════════════════
//  Answer
// ════════════════════════════════════════
function selectAnswer(optIdx) {
  if (userAnswers[current] !== null) return;
  userAnswers[current] = optIdx;
  renderQuestion(current);
}

// ════════════════════════════════════════
//  Navigation
// ════════════════════════════════════════
function navigate(dir) {
  const next = current + dir;
  if (next < 0) return;
  if (next >= QUESTIONS.length) { showResult(); return; }
  renderQuestion(next);
}

function goTo(idx) {
  document.getElementById('quiz-section').style.display = '';
  document.getElementById('result-card').classList.remove('visible');
  renderQuestion(idx);
}

// ════════════════════════════════════════
//  Result
// ════════════════════════════════════════
function showResult() {
  let correct = 0, wrong = 0, skip = 0;
  userAnswers.forEach((a, i) => {
    if (a === null) skip++;
    else if (a === QUESTIONS[i].answer) correct++;
    else wrong++;
  });
  const pct = Math.round(correct / QUESTIONS.length * 100);

  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('res-correct').textContent  = correct;
  document.getElementById('res-wrong').textContent    = wrong;
  document.getElementById('res-skip').textContent     = skip;

  // 各科成績細項
  const subjectStats = {};
  QUESTIONS.forEach((q, i) => {
    if (!subjectStats[q.subject]) subjectStats[q.subject] = { icon: q.subjectIcon, correct: 0, total: 0 };
    subjectStats[q.subject].total++;
    if (userAnswers[i] === q.answer) subjectStats[q.subject].correct++;
  });

  const breakdownEl = document.getElementById('result-subject-breakdown');
  breakdownEl.innerHTML = Object.entries(subjectStats).map(([name, s]) => {
    const pct = Math.round(s.correct / s.total * 100);
    const color = pct >= 60 ? 'var(--correct)' : pct >= 40 ? 'var(--gold)' : 'var(--wrong)';
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <span style="width:24px;text-align:center">${s.icon}</span>
      <span style="flex:1;font-size:0.82rem;color:var(--text-dim)">${name}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:0.82rem;color:${color};min-width:60px;text-align:right">${s.correct}/${s.total}　${pct}%</span>
    </div>`;
  }).join('');

  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-card').classList.add('visible');
  document.getElementById('progress-bar').style.width = '100%';
}

function restartQuiz() {
  document.getElementById('quiz-section').style.display = '';
  document.getElementById('result-card').classList.remove('visible');
  init(); // 重新抽題（每次順序不同）
}

// ════════════════════════════════════════
//  Start
// ════════════════════════════════════════
init();
</script>
